name: 🐞 Bug Report
description: Report a problem with a tool or page on AlphaCPSTest.com
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so it can be fixed quickly.
        This repository is documentation-only — bug reports help improve the live website.
  - type: input
    id: tool-page
    attributes:
      label: Tool or Page
      description: Which tool or page is affected? Include the URL if possible.
      placeholder: "https://alphacpstest.com/kohi-click-test"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: false
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System & Device
      placeholder: "Windows 11 Desktop / iOS 17 iPhone / Android 14 Phone"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Screenshots / Additional Context
      description: Add screenshots or anything else that helps.
    validations:
      required: false
